name: Morning Report

on:
  workflow_dispatch:
  repository_dispatch:
    types: [morning-report]

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run morning report
        run: node morning-report.js
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
