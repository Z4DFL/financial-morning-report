name: Morning Report

on:
  workflow_dispatch:
  repository_dispatch:
    types: [morning-report]

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run morning report
        run: node morning-report.js
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL || 'https://api.deepseek.com/v1' }}
          AI_MODEL: ${{ secrets.AI_MODEL || 'deepseek-chat' }}
